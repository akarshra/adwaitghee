version: '3.8'

services:
  web:
    build: .
    ports:
      - "9988:80"
    volumes:
      - ./frontend:/var/www/html
      - ./backend:/var/www/html/backend
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=rootpassword
      - DB_NAME=adwait_db
    depends_on:
      - db

  db:
    image: mysql:8.0
    ports:
      - "33066:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=adwait_db
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
